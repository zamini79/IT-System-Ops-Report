# =============================================================================
# apps/frontend/nginx.prod.conf  —  프로덕션 Nginx 설정
# =============================================================================

# 업로드 최대 크기 (Excel, PDF 등 대용량 파일 고려)
client_max_body_size 100m;

server {
    listen 80;
    root   /usr/share/nginx/html;
    index  index.html;

    # ── 정적 파일 (React 빌드 결과물) ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # 빌드된 JS/CSS는 콘텐츠 해시가 포함되어 있으므로 장기 캐시 적용
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API 프록시 ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 일반 API 타임아웃
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── SSE (Server-Sent Events) 프록시 ───────────────────────────────────────
    # /api/crawl/:jobId/stream, /api/report/:jobId/stream
    location ~* ^/api/(crawl|report)/[^/]+/stream$ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # SSE 필수: 버퍼링 완전 비활성화
        proxy_buffering    off;
        proxy_cache        off;

        # 장시간 연결 유지 (SSE 는 연결이 닫힐 때까지 유지)
        proxy_read_timeout 3600s;

        add_header X-Accel-Buffering no;
    }

    # ── 업로드 파일 서빙 프록시 ────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;

        # 파일 다운로드 타임아웃
        proxy_read_timeout 120s;
    }

    # ── 보안 헤더 ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── gzip 압축 ──────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    image/svg+xml;
}
