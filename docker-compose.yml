version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: skbs-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-skbs_it_report}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: skbs-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./apps/backend/uploads:/app/uploads

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: skbs-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
